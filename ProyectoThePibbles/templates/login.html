{% extends 'base.html' %}

{% block contenido %}

<section class="min-h-screen flex justify-center items-center px-6 py-10">

    <form method="POST"
          class="w-full max-w-[470px] min-h-[520px] px-8 py-10 text-center flex flex-col items-center justify-center gap-5 bg-white rounded-[20px] shadow-[0_10px_60px_rgb(204,251,241)]">
        
        {% csrf_token %}

        <h1 class="text-[42px] font-bold text-black mb-2">
            Iniciar sesión
        </h1>

        <p class="text-gray-500 text-base mb-4">
            Accede al Clasificador para usar los módulos del sistema.
        </p>

        <div class="w-full text-left">
            <label class="block mb-2 font-semibold text-black">
                Usuario
            </label>

            <input type="text"
                   name="username"
                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
                   placeholder="Ingresa tu usuario">
        </div>

        <div class="w-full text-left">
            <label class="block mb-2 font-semibold text-black">
                Contraseña
            </label>

            <input type="password"
                   name="password"
                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
                   placeholder="Ingresa tu contraseña">
        </div>

        {% if form.errors %}
            <p class="text-red-500 text-sm font-semibold">
                Usuario o contraseña incorrectos.
            </p>
        {% endif %}

        <button type="submit"
                class="w-full mt-3 bg-teal-500 text-white py-3 rounded-xl font-semibold transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
            Ingresar
        </button>

        <p class="text-lg text-black mt-2">
            ¿No tienes cuenta?
            <a href="{% url 'register' %}"
               class="text-teal-500 font-bold underline underline-offset-4 hover:text-teal-700 transition-colors">
                Regístrate
            </a>
        </p>

        <div class="w-full flex items-center gap-3 my-2">
            <div class="h-px bg-gray-300 flex-1"></div>
            <span class="text-sm text-gray-500">
                Ingresar con Google
            </span>
            <div class="h-px bg-gray-300 flex-1"></div>
        </div>

        <a href="#"
           class="w-12 h-12 rounded-full border border-gray-300 flex items-center justify-center text-teal-500 transition-all duration-200 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-6 h-6 fill-current">
                <path d="M16.318 13.714v5.484h9.078c-0.37 2.354-2.745 6.901-9.078 6.901-5.458 0-9.917-4.521-9.917-10.099s4.458-10.099 9.917-10.099c3.109 0 5.193 1.318 6.38 2.464l4.339-4.182c-2.786-2.599-6.396-4.182-10.719-4.182-8.844 0-16 7.151-16 16s7.156 16 16 16c9.234 0 15.365-6.49 15.365-15.635 0-1.052-0.115-1.854-0.255-2.651z"></path>
            </svg>
        </a>

    </form>

</section>

{% endblock %}
