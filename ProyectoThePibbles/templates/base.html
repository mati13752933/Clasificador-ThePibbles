{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head> 
<body>
    <div class="bg-white w-full sticky top-0 z-50 shadow-md grid grid-cols-3 px-10">
        <div class="justify-self-start flex items-center">
            <img src="{% static 'logo.png' %}" alt="Logo" class="h-[72px] w-auto ml-4 m-4">
            <h1 class="p-2 text-3xl font-bold text-teal-500">Clasificador de Residuos</h1>
        </div>

        <nav class="justify-self-center p-10">
            <ul class="flex items-center gap-12 text-base font-normal">
                <li>
                    <a href="{% url 'inicio' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Inicio
                    </a>
                </li>
                <li>
                    <a href="{% url 'reportes' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Reportes
                    </a>
                </li>
                <li>
                    <a href="{% url 'clasificacion' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Clasificación
                    </a>
                </li>
            </ul>
        </nav>

        <div class="justify-self-end flex items-center gap-8">
            {% if user.is_authenticated %}
               <div class = "px-8 flex flex-row items-center justify-center gap-2">
                    <input type="checkbox"
                        id="checkbox-voz"
                        class="hidden peer/voz"
                        onchange="toggleVozGlobal()">
                    <label for="checkbox-voz"
                    id="boton-voz"
                    onChange = "toggleVozGlobal()"
                    class="relative flex items-center gap-2 text-sm font-semibold w-[54px] h-[40px] rounded-lg border border-teal-500 text-teal-500 cursor-pointer overflow-hidden transition-all duration-300 ease-[cubic-bezier(0.175,0.885,0.32,1.275)]
                            hover:bg-teal-500 hover:text-white hover:ring-2 hover:ring-teal-500 hover:ring-offset-4 active:scale-95
                            peer-checked/voz:bg-teal-500 peer-checked:border-teal-500 peer-checked:text-white
                            peer-checked/voz:hover:bg-teal-600 peer-checked:hover:ring-2 peer-checked:hover:ring-teal-500 peer-checked:hover:ring-offset-4
                            peer-checked/voz:[&_.mic-on]:opacity-100
                            peer-checked/voz:[&_.mic-off]:opacity-0">

                    <span class="mic-on absolute inset-0 flex items-center justify-center gap-2 opacity-0 transition-all duration-300 ease-in-out">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-5 h-5"
                            fill="white"
                            viewBox="0 0 16 16">
                            <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"></path> 
                            <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"></path>
                        </svg>
                    </span>
                    <span class="mic-off absolute inset-0 flex items-center justify-center gap-2 opacity-100 transition-all duration-300 ease-in-out">
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-5 h-5"
                            fill="currentColor"
                            viewBox="0 0 16 16">
                            <path d="M13 8c0 .564-.094 1.107-.266 1.613l-.814-.814A4.02 4.02 0 0 0 12 8V7a.5.5 0 0 1 1 0v1zm-5 4c.818 0 1.578-.245 2.212-.667l.718.719a4.973 4.973 0 0 1-2.43.923V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 1 0v1a4 4 0 0 0 4 4zm3-9v4.879L5.158 2.037A3.001 3.001 0 0 1 11 3z"/>
                            <path d="M9.486 10.607 5 6.12V8a3 3 0 0 0 4.486 2.607zm-7.84-9.253 12 12 .708-.708-12-12-.708.708z"/>
                        </svg>
                    </span>
                    </label>
                    <input type="checkbox"
                        id="checkbox-camara"
                        class="hidden peer/camara"
                        onchange="toggleCamaraGlobal()">
                    <label for="checkbox-camara"
                        id="boton-camara-global"
                        title="Activar control por cámara"
                        class="relative flex items-center gap-2 text-sm font-semibold px-4 py-2 rounded-lg border border-teal-500 text-teal-500 cursor-pointer overflow-hidden transition-all duration-300 ease-[cubic-bezier(0.175,0.885,0.32,1.275)]
                                hover:bg-teal-500 hover:text-white hover:ring-2 hover:ring-teal-500 hover:ring-offset-4 active:scale-95
                                peer-checked/camara:bg-teal-500 peer-checked:border-teal-500 peer-checked:text-white
                                peer-checked/camara:hover:bg-teal-600 peer-checked:hover:ring-2 peer-checked:hover:ring-teal-500 peer-checked:hover:ring-offset-4
                                peer-checked/camara:[&_.cam-on]:opacity-100
                                peer-checked/camara:[&_.cam-off]:opacity-0">

                        <span class="cam-on absolute inset-0 flex items-center justify-center gap-2 opacity-0 transition-all duration-300 ease-in-out">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                class="w-5 h-5">
                                <g stroke-width="2"
                                stroke-linecap="round"
                                stroke="white"
                                fill-rule="evenodd"
                                clip-rule="evenodd">
                                    <path d="m4 9c0-1.10457.89543-2 2-2h2l.44721-.89443c.33879-.67757 1.03131-1.10557 1.78889-1.10557h3.5278c.7576 0 1.4501.428 1.7889 1.10557l.4472.89443h2c1.1046 0 2 .89543 2 2v8c0 1.1046-.8954 2-2 2h-12c-1.10457 0-2-.8954-2-2z"></path>
                                    <path d="m15 13c0 1.6569-1.3431 3-3 3s-3-1.3431-3-3 1.3431-3 3-3 3 1.3431 3 3z"></path>
                                </g>
                            </svg>
                        </span>
                        <span class="cam-off flex items-center gap-2 opacity-100 transition-all duration-300 ease-in-out">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                class="w-5 h-5">
                                <g stroke-width="2"
                                stroke-linecap="round"
                                stroke="currentColor"
                                fill-rule="evenodd"
                                clip-rule="evenodd">
                                    <path d="m4 9c0-1.10457.89543-2 2-2h2l.44721-.89443c.33879-.67757 1.03131-1.10557 1.78889-1.10557h3.5278c.7576 0 1.4501.428 1.7889 1.10557l.4472.89443h2c1.1046 0 2 .89543 2 2v8c0 1.1046-.8954 2-2 2h-12c-1.10457 0-2-.8954-2-2z"></path>
                                    <path d="m15 13c0 1.6569-1.3431 3-3 3s-3-1.3431-3-3 1.3431-3 3-3 3 1.3431 3 3z"></path>
                                </g>
                            </svg>
                        </span>
                    </label>
                </div>
                <a href="{% url 'perfil' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                    Perfil
                </a>
                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="inline-block bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                        Cerrar sesión
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="inline-block bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                    Inicia sesión
                </a>
                <a href="{% url 'register' %}" class="inline-block bg-white text-teal-500 border border-teal-500 px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                    Registrate
                </a>
            {% endif %}
        </div>
    </div>

    <main>
        {% block contenido %}
        {% endblock %}
    </main>

    {% if user.is_authenticated %}
<script>
    let procesandoComando = false;
    let vozActiva = false;

    async function actualizarBotonVoz() {
        try {
            const respuesta = await fetch("{% url 'estado_voz' %}");

            if (!respuesta.ok) {
                return;
            }

            const data = await respuesta.json();

            vozActiva = data.escuchando;

            const checkbox = document.getElementById("checkbox-voz");

            if (checkbox) {
                checkbox.checked = vozActiva;
            }

        } catch (error) {
            console.log("No se pudo consultar el estado de voz:", error);
        }
    }

    async function toggleVozGlobal() {
        try {
            const checkbox = document.getElementById("checkbox-voz");

            if (!checkbox) {
                return;
            }

            const url = checkbox.checked
                ? "{% url 'iniciar_voz' %}"
                : "{% url 'detener_voz' %}";

            const respuesta = await fetch(url);

            if (!respuesta.ok) {
                checkbox.checked = vozActiva;
                return;
            }

            const data = await respuesta.json();

            vozActiva = data.escuchando;
            checkbox.checked = vozActiva;

        } catch (error) {
            console.log("No se pudo cambiar el estado de voz:", error);

            const checkbox = document.getElementById("checkbox-voz");

            if (checkbox) {
                checkbox.checked = vozActiva;
            }
        }
    }

    async function pausarVoz() {
        try {
            await fetch("{% url 'pausar_voz' %}");
        } catch (error) {
            console.log("No se pudo pausar la voz:", error);
        }
    }

    async function reanudarVoz() {
        try {
            await fetch("{% url 'reanudar_voz' %}");
        } catch (error) {
            console.log("No se pudo reanudar la voz:", error);
        }
    }

    function reproducirAudio(texto) {
        return new Promise((resolve) => {
            const url = "{% url 'hablar_mensaje' %}" + "?texto=" + encodeURIComponent(texto);
            const audio = new Audio(url);

            audio.onended = resolve;
            audio.onerror = resolve;

            audio.play().catch((error) => {
                console.log("No se pudo reproducir el audio:", error);
                resolve();
            });
        });
    }

    async function hablarMensaje(texto) {
        try {
            await pausarVoz();
            await reproducirAudio(texto);
        } finally {
            await reanudarVoz();
        }
    }

    async function consultarComandoGlobal() {
        if (!vozActiva || procesandoComando) {
            return;
        }

        procesandoComando = true;

        try {
            const respuesta = await fetch("{% url 'ejecutar_comando_voz' %}");

            if (!respuesta.ok) {
                procesandoComando = false;
                return;
            }

            const data = await respuesta.json();

            if (!data.hay_comando) {
                procesandoComando = false;
                return;
            }

            console.log("Comando global recibido:", data);

            const resultado = data.resultado;

            console.log("Resultado:", resultado);
            console.log("Acción:", resultado.accion);
            console.log("Ruta:", resultado.ruta);

            if (resultado.ok === true && resultado.mensaje) {
                await hablarMensaje(resultado.mensaje);
            }

            if (resultado.ok === true && resultado.accion === "redirigir") {
                window.location.href = resultado.ruta;
                return;
            }

            if (resultado.ok === true && resultado.accion === "abrir_selector_imagen") {
                window.location.href = resultado.ruta;
                return;
            }

            procesandoComando = false;

        } catch (error) {
            console.error("Error consultando comando global:", error);
            procesandoComando = false;
        }
    }

    actualizarBotonVoz();

    setInterval(actualizarBotonVoz, 3000);
    setInterval(consultarComandoGlobal, 1000);
</script>
<script>
    let camaraActiva = false;

    async function actualizarBotonCamara() {
        try {
            const respuesta = await fetch("{% url 'estado_camara' %}");

            if (!respuesta.ok) {
                return;
            }

            const data = await respuesta.json();

            camaraActiva = data.activo;

            const checkbox = document.getElementById("checkbox-camara");

            if (checkbox) {
                checkbox.checked = camaraActiva;
            }

        } catch (error) {
            console.log("No se pudo consultar el estado de cámara:", error);
        }
    }

    async function toggleCamaraGlobal() {
        try {
            const checkbox = document.getElementById("checkbox-camara");

            if (!checkbox) {
                return;
            }

            const url = checkbox.checked
                ? "{% url 'iniciar_camara' %}"
                : "{% url 'detener_camara' %}";

            const respuesta = await fetch(url);

            if (!respuesta.ok) {
                checkbox.checked = camaraActiva;
                return;
            }

            const data = await respuesta.json();

            camaraActiva = data.activo;
            checkbox.checked = camaraActiva;

        } catch (error) {
            console.log("No se pudo cambiar el estado de cámara:", error);

            const checkbox = document.getElementById("checkbox-camara");

            if (checkbox) {
                checkbox.checked = camaraActiva;
            }
        }
    }

    async function consultarGestoCamara() {
        if (!camaraActiva) {
            return;
        }

        try {
            const respuesta = await fetch("{% url 'ejecutar_comando_camara' %}");

            if (!respuesta.ok) {
                return;
            }

            const data = await respuesta.json();

            if (!data.hay_gesto) {
                return;
            }

            console.log("Gesto recibido:", data.gesto);

            if (data.gesto === "clasificacion") {
                window.location.href = "/clasificacion/";
                return;
            }

            if (data.gesto === "reportes") {
                window.location.href = "/reportes/";
                return;
            }

            if (data.gesto === "perfil") {
                window.location.href = "/perfil/";
                return;
            }

            if (data.gesto === "detener") {
                await fetch("{% url 'detener_camara' %}");
                camaraActiva = false;

                const checkbox = document.getElementById("checkbox-camara");

                if (checkbox) {
                    checkbox.checked = false;
                }

                return;
            }

            if (data.gesto === "click") {
                console.log("Gesto click detectado");
                return;
            }

        } catch (error) {
            console.log("Error consultando gesto de cámara:", error);
        }
    }

    actualizarBotonCamara();

    setInterval(actualizarBotonCamara, 3000);
    setInterval(consultarGestoCamara, 1000);
</script>
{% endif %}

</body>
</html>
