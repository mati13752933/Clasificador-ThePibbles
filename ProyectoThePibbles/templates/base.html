{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head> 
<body>
    <div class = "bg-white w-full sticky top-0 z-50 shadow-md grid grid-cols-3 px-10">
        <div class = "justify-self-start flex items-center">
            <img src="{% static 'logo.png' %}" alt="Logo" class="h-[72px] w-auto ml-4 m-4">
            <h1 class="p-2 text-3xl font-bold text-teal-500">Clasificador de Residuos</h1>
        </div>
        <nav class="justify-self-center p-10">
            <ul class="flex items-center gap-12 text-base font-normal">
                <li>
                    <a href="{% url 'inicio' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Inicio
                    </a>
                </li>
                <li>
                    <a href="/control/" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Control
                    </a>
                </li>
                <li>
                    <a href="{% url 'reportes' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Reportes
                    </a>
                </li>
                <li>
                    <a href="{% url 'clasificacion' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                        Clasificación
                    </a>
                </li>
            </ul>
        </nav>
    
        <div class="justify-self-end flex items-center gap-6">
            {%if user.is_authenticated %}
             <a href="{% url 'perfil' %}" class="transition-all duration-200 hover:text-teal-500 hover:scale-110 inline-block">
                    Perfil
                </a>
            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="inline-block bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                    Cerrar sesión
                </button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="inline-block bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                Inicia sesión
            </a>
            <a href="{% url 'register' %}" class="inline-block bg-white text-teal-500 border border-teal-500 px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                Registrate
            </a>
            {% endif %}
        </div>
        
    
    </div>
    <main>
        {% block contenido %}
        {% endblock %}
    </main>
   {% if user.is_authenticated %}
    <script>
        let procesandoComando = false;

        async function pausarVoz() {
            try {
                await fetch("{% url 'pausar_voz' %}");
            } catch (error) {
                console.log("No se pudo pausar la voz:", error);
            }
        }

        async function reanudarVoz() {
            try {
                await fetch("{% url 'reanudar_voz' %}");
            } catch (error) {
                console.log("No se pudo reanudar la voz:", error);
            }
        }

        function reproducirAudio(texto) {
            return new Promise((resolve) => {
                const url = "{% url 'hablar_mensaje' %}" + "?texto=" + encodeURIComponent(texto);
                const audio = new Audio(url);

                audio.onended = resolve;
                audio.onerror = resolve;

                audio.play().catch((error) => {
                    console.log("No se pudo reproducir el audio:", error);
                    resolve();
                });
            });
        }

        async function hablarMensaje(texto) {
            try {
                await pausarVoz();
                await reproducirAudio(texto);
            } finally {
                await reanudarVoz();
            }
        }

        async function consultarComandoGlobal() {
            if (procesandoComando) {
                return;
            }

            procesandoComando = true;

            try {
                const respuesta = await fetch("{% url 'ejecutar_comando_voz' %}");

                if (!respuesta.ok) {
                    procesandoComando = false;
                    return;
                }

                const data = await respuesta.json();

                if (!data.hay_comando) {
                    procesandoComando = false;
                    return;
                }

                console.log("Comando global recibido:", data);

                const resultado = data.resultado;

                console.log("Resultado:", resultado);
                console.log("Acción:", resultado.accion);
                console.log("Ruta:", resultado.ruta);

                if (resultado.mensaje) {
                    await hablarMensaje(resultado.mensaje);
                }

                if (resultado.ok === true && resultado.accion === "redirigir") {
                    window.location.href = resultado.ruta;
                    return;
                }

                if (resultado.ok === true && resultado.accion === "abrir_selector_imagen") {
                    window.location.href = resultado.ruta;
                    return;
                }

                procesandoComando = false;

            } catch (error) {
                console.error("Error consultando comando global:", error);
                procesandoComando = false;
            }
        }

        setInterval(consultarComandoGlobal, 1000);
    </script>
    {% endif %}
</body>

</html>
