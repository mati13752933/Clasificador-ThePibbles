{% extends 'base.html' %}
{% block contenido %}
    <section class="min-h-screen flex justify-center items-center">
        <form method="POST" enctype="multipart/form-data" action="{% url 'clasificacion' %}"
            class="bg-white border border-gray-300 rounded-[20px] px-3 pt-5 pb-3 text-center text-lg max-w-[500px] mx-auto">
            {% csrf_token %}

            <h2 class="text-black text-[1.8rem] font-medium">
                Subir imagen
            </h2>

            <p class="mt-[10px] text-[0.9375rem] text-gray-500">
                Selecciona una imagen del residuo para clasificarla.
            </p>

            <label id="boton_seleccionar" for="file-input"
                class="bg-white relative flex gap-[10px] flex-col justify-center items-center p-[10px] mt-[2.1875rem] rounded-[10px] border-2 border-dashed border-teal-300 text-gray-700 cursor-pointer transition-all duration-200 hover:bg-teal-100 hover:border-gray-700">
                
                <span class="text-gray-700 text-[20px] font-bold text-center transition-colors duration-200">
                    Arrastra tu archivo aquí
                </span>

                <span class="text-sm text-gray-500">
                    o selecciónalo manualmente
                </span>

                <input id="file-input"
                    name="imagen"
                    type="file"
                    accept="image/*"
                    class="w-[350px] max-w-full text-gray-700 p-[2px] bg-white rounded-[10px] border border-black/30
                            file:mr-5 file:border-0 file:bg-teal-500 file:px-5 file:py-[10px] file:rounded-[10px] file:text-white file:cursor-pointer file:transition-colors file:duration-200
                            hover:file:bg-teal-700">
            </label>

            <div id="preview-container" class="hidden mt-6">
                <p class="text-sm text-gray-500 mb-2">Vista previa:</p>
                <img id="preview-img"
                    src=""
                    alt="Vista previa"
                    class="w-full max-h-[100px] object-contain shadow-md">
            </div>

            <div class="flex gap-3 justify-center mt-6">
                <button id="boton_clasificar" type="submit"
                    onclick="console.log('BOTON CLICKEADO')"
                    class="bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                    Clasificar
                </button>

                <button id="boton_usar_camara" type="button"
                    onclick="abrirModalCamara()"
                    class="bg-white border border-teal-500 text-teal-500 px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:bg-teal-50 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4
                           disabled:opacity-40 disabled:cursor-not-allowed disabled:pointer-events-none">
                    Usar cámara
                </button>
            </div>
        </form>
    </section>

    <div id="modal-camara" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60">
        <div class="bg-white rounded-2xl shadow-xl p-6 flex flex-col items-center gap-4 max-w-[480px] w-full mx-4">

            <div class="flex items-center justify-between w-full">
                <h3 class="text-xl font-semibold text-gray-800">Clasificar por cámara</h3>
                <button onclick="cerrarModalCamara()"
                    class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <p class="text-sm text-gray-500 text-center">
                Apuntá la cámara al residuo y presioná <span class="font-semibold text-teal-500">Capturar</span> para clasificarlo.
            </p>

            <video id="video-camara" autoplay playsinline muted
                class="w-full rounded-xl bg-black"></video>

            <button id="boton-capturar-clasificar" type="button" onclick="capturarYClasificar()"
                class="w-full bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                Capturar y clasificar
            </button>

            <button onclick="cerrarModalCamara()"
                class="w-full border border-gray-300 text-gray-600 px-6 py-2 rounded-lg font-normal transition-all duration-200 hover:bg-gray-50 active:scale-95">
                Cancelar
            </button>
        </div>
    </div>

    <canvas id="canvas-captura" class="hidden"></canvas>

    <script>
    const inputImagen = document.getElementById("file-input");
    const previewContainer = document.getElementById("preview-container");
    const previewImg = document.getElementById("preview-img");

    let modoAsistido = false;
    let streamCamara = null;

    async function actualizarBotonUsarCamara() {
        try {
            const resp = await fetch("{% url 'estado_camara' %}");
            const data = await resp.json();
            const boton = document.getElementById("boton_usar_camara");
            if (boton) {
                boton.disabled = data.activo;
            }
        } catch {}
    }

    actualizarBotonUsarCamara();
    setInterval(actualizarBotonUsarCamara, 3000);

    async function abrirModalCamara() {
        const modal = document.getElementById("modal-camara");
        const video = document.getElementById("video-camara");

        if (!modal || !video) {
            return;
        }

        modal.classList.remove("hidden");

        try {
            if (!streamCamara) {
                streamCamara = await navigator.mediaDevices.getUserMedia({ video: true });
            }
            video.srcObject = streamCamara;
            await video.play().catch(() => {});
        } catch (err) {
            console.error("Error cámara:", err);
            cerrarModalCamara();
        }
    }

    function cerrarModalCamara() {
        const modal = document.getElementById("modal-camara");
        const video = document.getElementById("video-camara");

        if (streamCamara) {
            streamCamara.getTracks().forEach(t => t.stop());
            streamCamara = null;
        }

        video.srcObject = null;
        modal.classList.add("hidden");
    }

    async function capturarYClasificar() {
        const video = document.getElementById("video-camara");
        const canvas = document.getElementById("canvas-captura");
        const boton = document.getElementById("boton-capturar-clasificar");

        if (!video || !canvas) {
            return;
        }

        if (!video.videoWidth || !video.videoHeight) {
            await abrirModalCamara();
            await new Promise((resolve) => setTimeout(resolve, 250));
        }

        if (!video.videoWidth || !video.videoHeight) {
            return;
        }

        if (boton) {
            boton.disabled = true;
            boton.textContent = "Capturando...";
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        cerrarModalCamara();

        canvas.toBlob(async (blob) => {
            if (!blob) {
                if (boton) {
                    boton.disabled = false;
                    boton.textContent = "Capturar y clasificar";
                }
                return;
            }

            const formData = new FormData();
            formData.append("imagen", blob, "captura.jpg");

            try {
                const resp = await fetch("{% url 'clasificacion' %}", {
                    method: "POST",
                    body: formData,
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    credentials: "same-origin"
                });

                if (resp.redirected) {
                    window.location.href = resp.url;
                } else if (resp.ok) {
                    window.location.href = "{% url 'resultado' %}";
                } else {
                    console.error("Error al clasificar desde cámara:", resp.status, resp.statusText);
                }
            } catch (error) {
                console.error("Error al clasificar desde cámara:", error);
            } finally {
                if (boton) {
                    boton.disabled = false;
                    boton.textContent = "Capturar y clasificar";
                }
            }
        }, "image/jpeg");
    }

    async function hacerClick(nombre) {
        const boton = document.getElementById(nombre);
        if (!boton) return;

        const rect = boton.getBoundingClientRect();
        const barraNavegador = window.outerHeight - window.innerHeight;

        const x = window.screenX + rect.left + (rect.width / 2);
        const y = window.screenY + barraNavegador + rect.top + (rect.height / 2);

        await fetch(`{% url 'click' %}?x=${x}&y=${y}`);
    }

    function hayImagenSeleccionada() {
        return inputImagen && inputImagen.files && inputImagen.files.length > 0;
    }

    async function abrirSelectorImagen() {
        modoAsistido = true;

        try {
            await fetch("{% url 'activar_modo_archivos' %}");
        } catch {}

        try {
            await fetch("{% url 'preparar_selector_archivos' %}");
        } catch {}

        setTimeout(() => {
            hacerClick("boton_seleccionar");
        }, 800);
    }

    async function clasificarImagenAutomatico() {
        modoAsistido = true;

        setTimeout(() => {
            hacerClick("boton_clasificar");
        }, 800);
    }

    async function ejecutarGestoClasificacion(gesto) {
        if (gesto === "clasificacion") {
            await abrirSelectorImagen();
            return;
        }

        if (gesto === "abrir_camara") {
            await abrirModalCamara();
            return;
        }

        if (gesto === "capturar") {
            const modal = document.getElementById("modal-camara");
            const modalAbierto = modal && !modal.classList.contains("hidden");

            if (!modalAbierto && typeof abrirModalCamara === "function") {
                await abrirModalCamara();
            }

            if (typeof capturarYClasificar === "function") {
                await capturarYClasificar();
            }
            return;
        }

        if (gesto === "click") {
            if (hayImagenSeleccionada()) {
                await clasificarImagenAutomatico();
            } else {
                await abrirSelectorImagen();
            }
        }
    }

    window.abrirModalCamara = abrirModalCamara;
    window.capturarYClasificar = capturarYClasificar;
    window.ejecutarGestoClasificacion = ejecutarGestoClasificacion;

    if (inputImagen) {
        inputImagen.addEventListener("change", async function () {
            const archivo = this.files[0];

            if (archivo) {
                if (previewImg && previewContainer) {
                    previewImg.src = URL.createObjectURL(archivo);
                    previewContainer.classList.remove("hidden");
                }

                try {
                    await fetch("{% url 'desactivar_modo_archivos' %}");
                } catch {}

                if (modoAsistido) {
                    setTimeout(() => {
                        hacerClick("boton_clasificar");
                    }, 800);
                }

            } else {
                if (previewImg && previewContainer) {
                    previewImg.src = "";
                    previewContainer.classList.add("hidden");
                }

                modoAsistido = false;
            }
        });
    }

    window.addEventListener("DOMContentLoaded", async function () {
        const params = new URLSearchParams(window.location.search);
        const accion = params.get("accion");

        if (accion === "subir_imagen") {
            await abrirSelectorImagen();
        } else if (accion === "abrir_camara") {
            await abrirModalCamara();
        }
    });
    </script>
{% endblock %}
