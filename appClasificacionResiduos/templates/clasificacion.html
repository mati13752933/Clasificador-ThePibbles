{% extends 'base.html' %}
{% block contenido %}
    <section class="min-h-screen flex justify-center items-center">
        <form method="POST" enctype="multipart/form-data" action="{% url 'clasificacion' %}"
            class="bg-white border border-gray-300 rounded-[20px] px-3 pt-5 pb-3 text-center text-lg max-w-[500px] mx-auto">
            {% csrf_token %}

            <h2 class="text-black text-[1.8rem] font-medium">
                Subir imagen
            </h2>

            <p class="mt-[10px] text-[0.9375rem] text-gray-500">
                Selecciona una imagen del residuo para clasificarla.
            </p>

            <label id = "boton_seleccionar" for="file-input"
                class="bg-white relative flex gap-[10px] flex-col justify-center items-center p-[10px] mt-[2.1875rem] rounded-[10px] border-2 border-dashed border-teal-300 text-gray-700 cursor-pointer transition-all duration-200 hover:bg-teal-100 hover:border-gray-700">
                
                <span class="text-gray-700 text-[20px] font-bold text-center transition-colors duration-200">
                    Arrastra tu archivo aquí
                </span>

                <span class="text-sm text-gray-500">
                    o selecciónalo manualmente
                </span>

                <input id="file-input"
                    name="imagen"
                    type="file"
                    accept="image/*"
                    class="w-[350px] max-w-full text-gray-700 p-[2px] bg-white rounded-[10px] border border-black/30
                            file:mr-5 file:border-0 file:bg-teal-500 file:px-5 file:py-[10px] file:rounded-[10px] file:text-white file:cursor-pointer file:transition-colors file:duration-200
                            hover:file:bg-teal-700">
                
            </label>
             <div id="preview-container" class="hidden mt-6">
                <p class="text-sm text-gray-500 mb-2">Vista previa:</p>

                <img id="preview-img"
                    src=""
                    alt="Vista previa"
                    class="w-full max-h-[100px] object-contain shadow-md">
            </div>
            <button id = "boton_clasificar" type="submit"
                onclick="console.log('BOTON CLICKEADO')"
                    class="mt-6 bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                Clasificar
            </button>
        </form>
    </section>
   <script>
    const inputImagen = document.getElementById("file-input");
    const previewContainer = document.getElementById("preview-container");
    const previewImg = document.getElementById("preview-img");

    let modoAsistido = false;

    async function hacerClick(nombre) {
        const boton = document.getElementById(nombre);
        if (!boton) return;

        const rect = boton.getBoundingClientRect();
        const barraNavegador = window.outerHeight - window.innerHeight;

        const x = window.screenX + rect.left + (rect.width / 2);
        const y = window.screenY + barraNavegador + rect.top + (rect.height / 2);

        await fetch(`{% url 'click' %}?x=${x}&y=${y}`);
    }

    function hayImagenSeleccionada() {
        return inputImagen && inputImagen.files && inputImagen.files.length > 0;
    }

    async function abrirSelectorImagen() {
        modoAsistido = true;

        try {
            await fetch("{% url 'activar_modo_archivos' %}");
        } catch {}

        try {
            await fetch("{% url 'preparar_selector_archivos' %}");
        } catch {}

        setTimeout(() => {
            hacerClick("boton_seleccionar");
        }, 800);
    }

    async function clasificarImagenAutomatico() {
        modoAsistido = true;

        setTimeout(() => {
            hacerClick("boton_clasificar");
        }, 800);
    }

    async function ejecutarGestoClasificacion(gesto) {
        if (gesto === "clasificacion") {
            await abrirSelectorImagen();
            return;
        }

        if (gesto === "click") {
            if (hayImagenSeleccionada()) {
                await clasificarImagenAutomatico();
            } else {
                await abrirSelectorImagen();
            }
        }
    }

    window.ejecutarGestoClasificacion = ejecutarGestoClasificacion;

    if (inputImagen) {
        inputImagen.addEventListener("change", async function () {
            const archivo = this.files[0];

            if (archivo) {
                if (previewImg && previewContainer) {
                    previewImg.src = URL.createObjectURL(archivo);
                    previewContainer.classList.remove("hidden");
                }

                try {
                    await fetch("{% url 'desactivar_modo_archivos' %}");
                } catch {}

                if (modoAsistido) {
                    setTimeout(() => {
                        hacerClick("boton_clasificar");
                    }, 800);
                }

            } else {
                if (previewImg && previewContainer) {
                    previewImg.src = "";
                    previewContainer.classList.add("hidden");
                }

                modoAsistido = false;
            }
        });
    }

    window.addEventListener("DOMContentLoaded", async function () {
        const params = new URLSearchParams(window.location.search);
        const accion = params.get("accion");

        if (accion === "subir_imagen") {
            await abrirSelectorImagen();
        }
    });
</script>
{% endblock %}
