{% extends 'base.html' %}
{% block contenido %}
    <section class="min-h-screen flex justify-center items-center">
        <form method="POST" enctype="multipart/form-data" action="{% url 'clasificacion' %}"
            class="bg-white border border-gray-300 rounded-[20px] px-3 pt-8 pb-3 text-center text-lg max-w-[500px] mx-auto">
            {% csrf_token %}

            <h2 class="text-black text-[1.8rem] font-medium">
                Subir imagen
            </h2>

            <p class="mt-[10px] text-[0.9375rem] text-gray-500">
                Selecciona una imagen del residuo para clasificarla.
            </p>

            <label for="file-input"
                class="bg-white relative flex gap-[10px] flex-col justify-center items-center p-[10px] mt-[2.1875rem] rounded-[10px] border-2 border-dashed border-teal-300 text-gray-700 cursor-pointer transition-all duration-200 hover:bg-teal-100 hover:border-gray-700">
                
                <span class="text-gray-700 text-[20px] font-bold text-center transition-colors duration-200">
                    Arrastra tu archivo aquí
                </span>

                <span class="text-sm text-gray-500">
                    o selecciónalo manualmente
                </span>

                <input id="file-input"
                    name="imagen"
                    type="file"
                    accept="image/*"
                    class="w-[350px] max-w-full text-gray-700 p-[2px] bg-white rounded-[10px] border border-black/30
                            file:mr-5 file:border-0 file:bg-teal-500 file:px-5 file:py-[10px] file:rounded-[10px] file:text-white file:cursor-pointer file:transition-colors file:duration-200
                            hover:file:bg-teal-700">
                
            </label>
             <div id="preview-container" class="hidden mt-6">
                <p class="text-sm text-gray-500 mb-2">Vista previa:</p>

                <img id="preview-img"
                    src=""
                    alt="Vista previa"
                    class="w-full max-h-[280px] object-contain shadow-md">
            </div>
            <button type="submit"
                onclick="console.log('BOTON CLICKEADO')"
                    class="mt-6 bg-teal-500 text-white px-6 py-2 rounded-lg font-normal transition-all duration-200 active:scale-95 hover:ring-2 hover:ring-teal-500 hover:ring-offset-4">
                Clasificar
            </button>
        </form>
    </section>
    <script>
        const inputImagen = document.getElementById("file-input");
        const previewContainer = document.getElementById("preview-container");
        const previewImg = document.getElementById("preview-img");

        inputImagen.addEventListener("change", function () {
            const archivo = this.files[0];

            if (archivo) {
                previewImg.src = URL.createObjectURL(archivo);
                previewContainer.classList.remove("hidden");
            } else {
                previewImg.src = "";
                previewContainer.classList.add("hidden");
            }
        });
    </script>
    <script>
        const formClasificacion = document.querySelector("form");

        formClasificacion.addEventListener("submit", function () {
            console.log("FORMULARIO ENVIÁNDOSE");
        });
    </script>
{% endblock %}
